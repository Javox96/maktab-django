{% load crispy_forms_filters %}

<div class="modal fade" id="id-login-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 overflow-hidden" style="border-radius: 28px; background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border);">
            <!-- Modal Header Decoration -->
            <div class="position-absolute top-0 start-0 w-100" style="height: 6px; background: linear-gradient(to right, var(--brand-primary), var(--brand-accent));"></div>
            
            <div class="modal-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" 
                        style="width: 64px; height: 64px; font-size: 1.5rem; background: var(--brand-primary) !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <h3 class="fw-800 mb-1" style="color: var(--text-main);">Xush kelibsiz!</h3>
                    <p class="text-muted small">Profilingizga kirish uchun ma'lumotlarni to'ldiring</p>
                </div>

                <form action="{% url 'account:login' %}" method="post">
                    {% csrf_token %}
                    <div class="form-wrapper-modal">
                        {{ LOGIN_FORM|crispy }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-4 mb-3 rounded-3 fw-700 d-flex align-items-center justify-content-center gap-2">
                        TIZIMGA KIRISH
                        <i class="fa-solid fa-right-to-bracket small opacity-50"></i>
                    </button>
                    
                    <div class="text-center">
                        <p class="text-muted small mb-0 fw-500">
                            Hisobingiz yo'qmi? <a href="{% url 'account:regist' %}" class="text-primary fw-700 text-decoration-none hover-underline">Ro'yxatdan o'ting</a>
                        </p>
                    </div>
                </form>
            </div>
            
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-4 shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
    </div>
</div>

<style>
    .modal.fade .modal-dialog { transform: scale(0.9) translateY(20px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s; }
    .modal.show .modal-dialog { transform: scale(1) translateY(0); }
    
    .form-wrapper-modal .mb-3 label { font-weight: 700; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    .form-wrapper-modal .form-control { 
        border-radius: 14px; 
        padding: 12px 18px; 
        border: 1.5px solid var(--border-light); 
        background: var(--surface-light);
        color: var(--text-main);
        transition: all 0.2s;
        font-size: 0.9rem;
    }
    .form-wrapper-modal .form-control:focus {
        border-color: var(--brand-primary);
        background: var(--surface-light);
        color: var(--text-main);
        box-shadow: 0 0 0 4px var(--brand-primary-light);
    }
    .hover-underline:hover { text-decoration: underline !important; }
</style>
